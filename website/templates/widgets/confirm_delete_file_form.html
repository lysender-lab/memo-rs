<form
    method="post"
    action="/{{ dir.dir_type }}/{{ dir.id }}/files/{{ file.id }}/delete"
    hx-post="/{{ dir.dir_type }}/{{ dir.id }}/files/{{ file.id }}/delete"
    hx-target="closest .file-table-row"
    hx-swap="outerHTML"
>
    {% match error_message %}
        {% when Some with (msg) %}
            <p class="has-text-danger">{{ msg }}</p>
        {% when None %}
    {% endmatch %}

    <input type="hidden" name="token" value="{{ payload.token }}" />

    <div class="file-actions">
        <button
            type="button"
            class="button is-small is-light"
            hx-get="/{{ dir.dir_type }}/{{ dir.id }}/files/{{ file.id }}/file-actions"
            hx-target="closest .file-actions-w"
            hx-swap="innnerHTML"
        >
            <span class="icon is-small">
                <i class="fas fa-arrow-left"></i>
            </span>
        </button>
        <button class="button is-small is-danger" type="submit">
            <span class="icon is-small">
                <i class="fas fa-times"></i>
            </span>
        </button>
    </div>
</form>
