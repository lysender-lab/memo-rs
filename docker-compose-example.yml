services:
  api:
    platform: linux/arm64
    container_name: memo-api
    build:
      context: api
    volumes:
      - ./build/bin:/app/bin
      - ./build/db:/app/db
      - ./build/certs:/app/certs
    ports:
      - "127.0.0.1:11001:80"
    environment:
      DATABASE_DIR: "/app/db/env"
      DATABASE_POOL_SIZE: "4"
      JWT_SECRET: "secret"
      UPLOAD_DIR: "/app/uploads"
      SERVER_ADDRESS: "0.0.0.0:80"
      AWS_ACCESS_KEY_ID: "change-me"
      AWS_SECRET_ACCESS_KEY: "change-me"
      AWS_REGION: "ap-southeast-1"
      AWS_S3_BUCKET: "change-me"
      AUTH_API_BASE_URL: "https://yaas-flashy-domain.com"
    networks:
      - memonet
    restart: always

  website:
    platform: linux/arm64
    container_name: memo-website
    build:
      context: website
    volumes:
      - ./build/bin:/app/bin
      - ./build/html/public:/app/html/public
    ports:
      - "127.0.0.1:11000:80"
    environment:
      SERVER_ADDRESS: "0.0.0.0:80"
      SERVER_PUBLIC_URL: "https://awesome-domain.com"
      HTTPS: "1"
      FRONTEND_DIR: "/app/html"
      API_URL: "http://api"
      JWT_SECRET: "secret"
      GA_TAG_ID: ""
      AUTH_PUBLIC_BASE_URL: "https://yaas-flashy-domain.com"
      AUTH_API_BASE_URL: "https://yaas-flashy-domain.com"
      AUTH_CLIENT_ID: "xxx"
      AUTH_CLIENT_SECRET: "xxx"
    networks:
      - memonet
    restart: always

networks:
  yaasnet:
    name: memonet
